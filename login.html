<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Traveloop Login</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow p-4 mt-5">

                    <!-- Heading -->

                    <h1 class="text-center mb-4">

                        Traveloop ✈️

                    </h1>

                    <h4 class="text-center mb-4">

                        Login To Continue

                    </h4>

                    <!-- Login Form -->

                    <form method="POST"
                          action="/login">

                        <!-- Email -->

                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email"
                                required
                            >

                        </div>

                        <!-- Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password"
                                required
                            >

                        </div>

                        <!-- Login Button -->

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <!-- Signup Link -->

                    <div class="text-center mt-4">

                        <p>

                            Don't have an account?

                        </p>

                        <a href="/signup">

                            Create Account

                        </a>

                    </div>

                    <!-- Dashboard Link -->

                    <div class="text-center mt-3">

                        <a href="/dashboard"
                           class="btn btn-success">

                            Go To Dashboard

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
