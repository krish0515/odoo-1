<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Trips</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-dark bg-primary">

        <div class="container-fluid">

            <span class="navbar-brand mb-0 h1">

                Traveloop ✈️

            </span>

            <!-- Dashboard Button -->

            <a href="/dashboard"
               class="btn btn-light">

               Dashboard

            </a>

        </div>

    </nav>

    <!-- Main Container -->

    <div class="container mt-5">

        <!-- Heading -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>

                My Trips 🌍

            </h2>

            <!-- Create Trip Button -->

            <a href="/create-trip"
               class="btn btn-primary">

               + New Trip

            </a>

        </div>

        <!-- Trips Row -->

        <div class="row">

    {% for trip in trips %}

    <div class="col-md-6">

        <div class="card bg-secondary text-white shadow-lg border-0 rounded-4 mb-4">

            <div class="card-body p-4">

                <!-- Trip Name -->

                <h2 class="fw-bold">

                    {{ trip.name }}

                </h2>

                <!-- Trip Date -->

                <p class="mt-3 fs-5">

                    📅 {{ trip.date }}

                </p>

                <!-- Budget -->

                <p class="fs-5">

                    💰 Budget:
                    ₹{{ trip.budget }}

                </p>

                <!-- Buttons -->

                <a href="/trips"
                   class="btn btn-success rounded-pill">

                   View Trip

                </a>

                <button
                    class="btn btn-danger rounded-pill">

                    Delete

                </button>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

    </div>

</body>

</html>
